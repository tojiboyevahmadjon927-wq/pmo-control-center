name: pmo_control_center

services:
  mysql:
    image: mysql:8.0
    container_name: pmo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: pmo_db
    ports:
      - "3306:3306"
    volumes:
      - pmo_mysql_data:/var/lib/mysql
      - ./setup.sql:/docker-entrypoint-initdb.d/setup.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: pmo_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: pmo_db
    ports:
      - "8080:8080"
    volumes:
      - ./pmo_data.json:/app/pmo_data.json

  agent:
    build: .
    container_name: pmo_agent
    restart: unless-stopped
    depends_on:
      - app
    command: ["node", "agent.js"]
    environment:
      PORT: 8081
    ports:
      - "8081:8081"
    volumes:
      - ./pmo_data.json:/app/pmo_data.json
      - ./agent_config.json:/app/agent_config.json

volumes:
  pmo_mysql_data:
